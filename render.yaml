# render.yaml — Configuration déploiement Render
services:
  - type: web
    name: amgsbsfax-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        sync: false           # À définir manuellement dans Render Dashboard
      - key: DATABASE_URL
        sync: false           # URL Neon PostgreSQL
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
    autoDeploy: true          # Déploiement automatique à chaque push GitHub
