<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — AMGSBS Tunisie</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#0d2035 0%,#1a4a6e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .login-card{background:white;border-radius:24px;padding:50px 44px;width:420px;box-shadow:0 30px 80px rgba(0,0,0,.4);text-align:center;}
  .login-icon{font-size:60px;margin-bottom:16px;}
  h1{font-family:'Playfair Display',serif;font-size:26px;color:#1a4a6e;margin-bottom:6px;}
  p{color:#607080;font-size:14px;margin-bottom:30px;}
  .form-group{text-align:left;margin-bottom:16px;}
  label{display:block;font-size:12px;font-weight:700;color:#1a4a6e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  input{width:100%;padding:14px 18px;border:2px solid #d0dce8;border-radius:12px;font-family:inherit;font-size:15px;outline:none;transition:border-color .2s;}
  input:focus{border-color:#1a4a6e;box-shadow:0 0 0 3px rgba(26,74,110,.08);}
  button{width:100%;background:#c8902a;color:white;padding:15px;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:all .3s;}
  button:hover{background:#b07a20;transform:translateY(-2px);}
  .flash{padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:13px;text-align:left;}
  .flash.error{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;}
  .back-link{display:block;margin-top:20px;color:#607080;font-size:13px;text-decoration:none;}
  .back-link:hover{color:#1a4a6e;}
</style>
</head>
<body>
<div class="login-card">
  <div style="display:flex;justify-content:center;margin-bottom:16px"><img src="{{ url_for('static', filename='images/logo_amgsbs.png') }}" alt="AMGSBS" style="width:80px;height:80px;border-radius:50%;box-shadow:0 4px 16px rgba(26,74,110,.2)"></div>
  <h1>Espace Administrateur</h1>
  <p>AMGSBS Sfax — Tableau de bord</p>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for cat,msg in messages %}<div class="flash {{ cat }}">{{ msg }}</div>{% endfor %}{% endif %}
  {% endwith %}
  <form method="POST" action="{{ url_for('admin.login') }}">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required placeholder="admin@amgsbsfax.tn" autofocus>
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" name="password" required placeholder="••••••••">
    </div>
    <button type="submit">Se connecter →</button>
  </form>
  <a href="{{ url_for('main.index') }}" class="back-link">← Retour au site</a>
</div>
</body>
</html>
